<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>领航财务BI看板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--bg4:#2a2f45;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--text2:#9099b0;--text3:#555e7a;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;--amber:#fbbf24;--purple:#a78bfa;--teal:#2dd4bf;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#60a5fa,#a78bfa);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.logo-text{font-size:15px;font-weight:700;color:var(--text);}
.logo-sub{font-size:11px;color:var(--text3);}
.hdr-r{display:flex;align-items:center;gap:14px;}
.sync{display:flex;align-items:center;gap:6px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.25);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--green);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
#upd{font-size:11px;color:var(--text3);}
.filter-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.quick-btns{display:flex;gap:4px;}
.qbtn{padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;}
.qbtn:hover{border-color:var(--blue);color:var(--blue);}
.qbtn.active{background:rgba(96,165,250,0.15);color:var(--blue);border-color:var(--blue);}
.divider{width:1px;height:24px;background:var(--border2);margin:0 4px;}
.date-range{display:flex;align-items:center;gap:8px;}
.date-input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text);font-family:'Noto Sans SC',sans-serif;outline:none;color-scheme:dark;}
.date-input:focus{border-color:var(--blue);}
.confirm-btn{padding:5px 14px;border-radius:6px;background:var(--blue);border:none;font-size:12px;color:#fff;font-weight:500;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.range-label{font-size:11px;color:var(--text3);}
main{padding:20px 28px;max-width:1440px;margin:0 auto;}
.sec{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:12px;letter-spacing:0.06em;display:flex;align-items:center;gap:8px;}
.sec::before{content:'';width:3px;height:12px;background:var(--blue);border-radius:2px;display:inline-block;}
.kg5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.kg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.kg2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
.kc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.15s;}
.kc:hover{border-color:var(--border2);transform:translateY(-1px);}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0;}
.kc.c-blue::before{background:linear-gradient(90deg,#60a5fa,#818cf8);}
.kc.c-green::before{background:linear-gradient(90deg,#4ade80,#22d3ee);}
.kc.c-red::before{background:linear-gradient(90deg,#f87171,#fb923c);}
.kc.c-amber::before{background:linear-gradient(90deg,#fbbf24,#f59e0b);}
.kc.c-purple::before{background:linear-gradient(90deg,#a78bfa,#ec4899);}
.kc.c-teal::before{background:linear-gradient(90deg,#2dd4bf,#60a5fa);}
.kc.c-orange::before{background:linear-gradient(90deg,#fb923c,#f87171);}
.kl{font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:500;}
.kv{font-size:17px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-0.3px;color:var(--text);}
.kmeta{margin-top:10px;display:flex;flex-direction:column;gap:4px;}
.kmeta-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;}
.kmeta-label{color:var(--text3);}
.kmeta-val{font-family:'JetBrains Mono',monospace;font-size:11px;}
.pos{color:var(--green)!important;}
.neg{color:var(--red)!important;}
.neu{color:var(--text2)!important;}
.hi-a{color:var(--amber);}
.chart-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.ct{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.cs{font-size:11px;color:var(--text3);margin-bottom:14px;}
.prog-list{display:flex;flex-direction:column;gap:14px;margin-top:4px;}
.prog-item{}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-name{font-size:12px;color:var(--text2);}
.prog-vals{display:flex;gap:8px;align-items:center;}
.prog-pct{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.prog-num{font-size:11px;color:var(--text3);}
.prog-bg{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;}
.prog-bar{height:100%;border-radius:4px;transition:width 0.6s ease;}
.bar-green{background:linear-gradient(90deg,#4ade80,#22d3ee);}
.bar-blue{background:linear-gradient(90deg,#60a5fa,#818cf8);}
.bar-red{background:linear-gradient(90deg,#f87171,#fb923c);}
.bar-amber{background:linear-gradient(90deg,#fbbf24,#f59e0b);}
.bar-purple{background:linear-gradient(90deg,#a78bfa,#ec4899);}
.bar-teal{background:linear-gradient(90deg,#2dd4bf,#60a5fa);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:8px;}
footer a{color:var(--text3);text-decoration:none;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">财</div>
    <div><div class="logo-text">领航财务BI看板</div><div class="logo-sub">实时数据同步</div></div>
  </div>
  <div class="hdr-r">
    <div id="upd">加载中...</div>
    <div class="sync"><div class="dot"></div>实时同步</div>
  </div>
</header>

<div class="filter-bar">
  <div class="quick-btns">
    <button class="qbtn" onclick="setQuick(this,'today')">今日</button>
    <button class="qbtn" onclick="setQuick(this,'yesterday')">昨日</button>
    <button class="qbtn" onclick="setQuick(this,'week')">本周</button>
    <button class="qbtn" onclick="setQuick(this,'lastmonth')">上月</button>
    <button class="qbtn active" onclick="setQuick(this,'month')">本月</button>
  </div>
  <div class="divider"></div>
  <div class="date-range">
    <input type="date" class="date-input" id="date-from">
    <span style="color:var(--text3);font-size:12px">→</span>
    <input type="date" class="date-input" id="date-to">
    <button class="confirm-btn" onclick="applyCustomRange()">确定</button>
  </div>
  <div class="range-label" id="range-label"></div>
</div>

<main id="main-content"></main>

<footer>
  数据来源：Google Sheets · 领航财务BI模版 · 每60秒自动刷新 ·
  <a href="https://docs.google.com/spreadsheets/d/1JyXWDifCSfqXNVOwiS4xvLfQpmlLhW-GFsjSsqzJ7TY" target="_blank">查看原始表格</a>
</footer>

<script>
// ═══════════════════════════════════
// 配置
// ═══════════════════════════════════
const SHEET_ID   = '1JyXWDifCSfqXNVOwiS4xvLfQpmlLhW-GFsjSsqzJ7TY';
const GID_DAILY  = '287726551';
const GID_BUDGET = '1005558888';
const GID_AD     = '100107827';
const REFRESH_MS = 60000;

// 日数据列索引（0-based，已通过Console完整验证）
// col0=年, col1=月份, col2=日期
// col6=实际收入, col4=实际支出, col8=实际损耗, col9=实际毛利
// col12=充值, col13=广告, col14=其他, col16=合计收入
// col38=通道损耗, col39=广告损耗
// col42=技术, col43=运营, col44=商务, col45=渠道, col46=其他支出, col47=合计支出
const C = {
  month:1, date:2,
  actual_inc:6,
  actual_exp:4,
  actual_loss:8,
  actual_profit:9,
  inc_charge:12, inc_ad:13, inc_other:14, inc_total:16,
  loss_channel:38, loss_ad:39,
  exp_tech:42, exp_ops:43, exp_biz:44, exp_channel:45, exp_other:46, exp_total:47
};

// 广告类型
const AD_TYPES  = ['棋牌','约炮','播放器','直播','春药','成人游戏'];
const AD_COLORS = ['#60a5fa','#f87171','#4ade80','#fbbf24','#a78bfa','#2dd4bf'];

// 3月预算（从预算Sheet结构读取，暂时按已知数据硬编码）
const BUDGET = {
  inc_charge:27278000, inc_ad:38000000, inc_other:0, inc_total:65278000,
  exp_tech:5824000, exp_ops:2956000, exp_biz:1200000, exp_channel:17500000, exp_other:0, exp_total:27480000,
  profit_target:10520000
};

// ═══════════════════════════════════
// 状态
// ═══════════════════════════════════
let allRows=[], adRows=[], filterFrom=null, filterTo=null;
let budgetRows=[], charts={};

// ═══════════════════════════════════
// 工具
// ═══════════════════════════════════
const toYMD = d => {
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};

// 实数格式：1,234,567
const fmt = v => {
  if(v===null||v===undefined||isNaN(v))return'0';
  const n=Math.round(parseFloat(v));
  return n.toLocaleString('zh-CN');
};

const fmtDec = v => {
  if(!v||isNaN(v))return'0';
  return parseFloat(v).toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:2});
};

const fmtPct = v => {
  if(!v||isNaN(v))return'0.00%';
  return parseFloat(v).toFixed(2)+'%';
};

const pctOf = (a,b) => b&&b!==0?(a/b*100):0;
const pctStr = (a,b) => fmtPct(pctOf(a,b));
const sum = (rows,k) => rows.reduce((s,r)=>s+(r[k]||0),0);
const posClass = v => v>0?'pos':v<0?'neg':'neu';

function parseGSheetDate(v){
  if(!v)return null;
  const s=String(v);
  // Date(2026,2,1) 格式
  const m=s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if(m)return new Date(parseInt(m[1]),parseInt(m[2]),parseInt(m[3]));
  // 2026-1-1 格式
  const m2=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m2)return new Date(parseInt(m2[1]),parseInt(m2[2])-1,parseInt(m2[3]));
  return null;
}

function startOfMonth(){const d=new Date();d.setDate(1);d.setHours(0,0,0,0);return d;}
function startOfLastMonth(){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);d.setHours(0,0,0,0);return d;}
function endOfLastMonth(){const d=new Date();d.setDate(0);d.setHours(23,59,59,999);return d;}
function startOfWeek(){const d=new Date();d.setDate(d.getDate()-((d.getDay()+6)%7));d.setHours(0,0,0,0);return d;}

// ═══════════════════════════════════
// 数据获取
// ═══════════════════════════════════
async function fetchGID(gid){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}&nocache=${Date.now()}`;
  const resp=await fetch(url);
  const text=await resp.text();
  return JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
}

function parseDailyRows(json){
  const result=[];
  for(const row of json.table.rows){
    const c=row.c||[];
    // 月份列必须是1-12的整数
    const monthCell=c[C.month];
    if(!monthCell?.v)continue;
    const monthVal=parseFloat(monthCell.v);
    if(isNaN(monthVal)||monthVal<1||monthVal>12||!Number.isInteger(monthVal))continue;
    // 日期列必须是 Date(...) 格式
    const dateCell=c[C.date];
    if(!dateCell?.v)continue;
    const dateStr=String(dateCell.v);
    if(!dateStr.startsWith('Date('))continue; // 只接受Date(...)格式
    const dateObj=parseGSheetDate(dateStr);
    if(!dateObj)continue;
    const g=i=>(c[i]?.v!=null)?parseFloat(c[i].v)||0:0;
    result.push({
      month:   monthVal,
      date:    dateCell.f || toYMD(dateObj),
      ymd:     toYMD(dateObj),
      actual_inc:    g(C.actual_inc),
      actual_exp:    g(C.actual_exp),
      actual_loss:   g(C.actual_loss),
      actual_cost:   g(C.actual_exp) + g(C.actual_loss),
      actual_profit: g(C.actual_profit),
      inc_charge:    g(C.inc_charge),
      inc_ad:        g(C.inc_ad),
      inc_other:     g(C.inc_other),
      inc_total:     g(C.inc_total),
      loss_channel:  g(C.loss_channel),
      loss_ad:       g(C.loss_ad),
      exp_tech:      g(C.exp_tech),
      exp_ops:       g(C.exp_ops),
      exp_biz:       g(C.exp_biz),
      exp_channel:   g(C.exp_channel),
      exp_other:     g(C.exp_other),
      exp_total:     g(C.exp_total),
    });
  }
  return result;
}

// 预算Sheet列索引（0-based）
// 0=空, 1=年, 2=月
// G=6(收入合计完成比例), L=11(开支合计消耗比例)
// 目标收入合计=列25, 预算合计=列29
function parseBudgetRows(json){
  const result=[];
  for(const row of json.table.rows){
    const c=row.c||[];
    const yearCell=c[1], monthCell=c[2];
    if(!yearCell?.v||!monthCell?.v)continue;
    const yr=parseFloat(yearCell.v), mo=parseFloat(monthCell.v);
    if(isNaN(yr)||isNaN(mo)||mo<1||mo>12)continue;
    const g=i=>(c[i]?.v!=null)?parseFloat(c[i].v)||0:0;
    result.push({
      year:yr, month:mo,
      inc_achieve_pct: g(6),   // G栏：收入合计完成比例
      exp_consume_pct: g(11),  // L栏：开支合计消耗比例
      inc_target:      g(25),  // 目标收入合计
      exp_budget:      g(29),  // 预算合计
    });
  }
  return result;
}

function getBudgetForMonth(mo){
  return budgetRows.find(r=>r.month===mo)||null;
}

function parseAdRows(json){
  const result=[];
  for(const row of json.table.rows){
    const c=row.c||[];
    const dateCell=c[2];
    const typeCell=c[4];
    const rmbCell =c[5];
    if(!dateCell?.v||!typeCell?.v||rmbCell?.v==null)continue;
    const dateObj=parseGSheetDate(String(dateCell.v));
    if(!dateObj)continue;
    const rmb=parseFloat(rmbCell.v)||0;
    result.push({ymd:toYMD(dateObj), type:String(typeCell.v), rmb});
  }
  return result;
}

// ═══════════════════════════════════
// 筛选
// ═══════════════════════════════════
function filtered(){
  return allRows.filter(r=>{
    if(!r.ymd)return true;
    if(filterFrom&&r.ymd<filterFrom)return false;
    if(filterTo  &&r.ymd>filterTo  )return false;
    return true;
  });
}

function filteredAd(){
  return adRows.filter(r=>{
    if(filterFrom&&r.ymd<filterFrom)return false;
    if(filterTo  &&r.ymd>filterTo  )return false;
    return true;
  });
}

// 获取上月同期数据
function getPrevMonthRows(rows){
  if(!filterFrom||!filterTo)return[];
  const from=new Date(filterFrom), to=new Date(filterTo);
  const prevFrom=toYMD(new Date(from.getFullYear(),from.getMonth()-1,from.getDate()));
  const prevTo  =toYMD(new Date(to.getFullYear(),to.getMonth()-1,to.getDate()));
  return allRows.filter(r=>r.ymd&&r.ymd>=prevFrom&&r.ymd<=prevTo);
}

function getPrevAdRows(){
  if(!filterFrom||!filterTo)return[];
  const from=new Date(filterFrom), to=new Date(filterTo);
  const prevFrom=toYMD(new Date(from.getFullYear(),from.getMonth()-1,from.getDate()));
  const prevTo  =toYMD(new Date(to.getFullYear(),to.getMonth()-1,to.getDate()));
  return adRows.filter(r=>r.ymd>=prevFrom&&r.ymd<=prevTo);
}

// ═══════════════════════════════════
// 时间筛选
// ═══════════════════════════════════
function setQuick(btn,type){
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const t=new Date();
  if(type==='today')filterFrom=filterTo=toYMD(t);
  else if(type==='yesterday'){const y=new Date(t);y.setDate(y.getDate()-1);filterFrom=filterTo=toYMD(y);}
  else if(type==='week'){filterFrom=toYMD(startOfWeek());filterTo=toYMD(t);}
  else if(type==='month'){filterFrom=toYMD(startOfMonth());filterTo=toYMD(t);}
  else if(type==='lastmonth'){filterFrom=toYMD(startOfLastMonth());filterTo=toYMD(endOfLastMonth());}
  document.getElementById('date-from').value=filterFrom;
  document.getElementById('date-to').value=filterTo;
  updateLabel();render();
}
function applyCustomRange(){
  filterFrom=document.getElementById('date-from').value;
  filterTo=document.getElementById('date-to').value;
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  updateLabel();render();
}
function updateLabel(){
  document.getElementById('range-label').textContent=filterFrom&&filterTo?`${filterFrom} ~ ${filterTo}`:'';
}

// ═══════════════════════════════════
// 图表工具
// ═══════════════════════════════════
const tp={backgroundColor:'rgba(26,29,39,0.95)',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#9099b0',bodyColor:'#e8eaf0'};

function mkChart(id,cfg){
  if(charts[id])charts[id].destroy();
  const ctx=document.getElementById(id);
  if(!ctx)return;
  charts[id]=new Chart(ctx,cfg);
}

function pieOpts(labels,data,colors){
  return{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'rgba(255,255,255,0.05)',borderWidth:1,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{color:'#9099b0',font:{size:11},boxWidth:12}},
        tooltip:{...tp,callbacks:{label:c=>{const tot=c.dataset.data.reduce((a,b)=>a+b,0);return `${c.label}: ${fmt(c.raw)} (${fmtPct(tot>0?c.raw/tot*100:0)})`;}}}}}};
}

function hbarOpts(labels,datasets,fmtFn){
  return{type:'bar',data:{labels,datasets},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:datasets.length>1,labels:{color:'#9099b0',font:{size:11}}},tooltip:{...tp,callbacks:{label:c=>`${c.dataset.label||''}: ${(fmtFn||fmt)(c.raw)}`}}},
      scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555e7a',font:{size:10},callback:v=>(fmtFn||fmt)(v)}},y:{grid:{display:false},ticks:{color:'#9099b0',font:{size:11}}}}}};
}

// ═══════════════════════════════════
// 环比箭头
// ═══════════════════════════════════
function momArrow(cur,prev){
  if(!prev||prev===0)return`<span class="neu">—</span>`;
  const p=((cur-prev)/Math.abs(prev)*100);
  const s=p.toFixed(1);
  return p>=0?`<span class="pos">▲${s}%</span>`:`<span class="neg">▼${Math.abs(parseFloat(s))}%</span>`;
}

// ═══════════════════════════════════
// 渲染
// ═══════════════════════════════════
function render(){
  const rows=filtered();
  const prev=getPrevMonthRows(rows);
  const adCur=filteredAd();
  const adPrv=getPrevAdRows();

  // 当期汇总
  const inc    = sum(rows,'inc_total');
  const incC   = sum(rows,'inc_charge');
  const incA   = sum(rows,'inc_ad');
  const incO   = sum(rows,'inc_other');
  const cost   = sum(rows,'actual_cost');  // 总成本 = I+J
  const exp    = sum(rows,'exp_total');
  const expT   = sum(rows,'exp_tech');
  const expO   = sum(rows,'exp_ops');

    afterDatasetsDraw(chart){

      chart.data.datasets.forEach((_,di)=>{

          // 顶面
          ctx.save();
          ctx.beginPath();

          ctx.lineTo(x-width/2+SKEW, y-DEPTH);

          ctx.moveTo(x+width/2, y);
          ctx.lineTo(x+width/2+SKEW, y-DEPTH);

  function lighten(hex,amt){
    const r=parseInt(hex.slice(1,3)||'60',16),g=parseInt(hex.slice(3,5)||'a5',16),b=parseInt(hex.slice(5,7)||'fa',16);
    return`rgba(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)},0.9)`;

  function darken(hex,amt){
    const r=parseInt(hex.slice(1,3)||'60',16),g=parseInt(hex.slice(3,5)||'a5',16),b=parseInt(hex.slice(5,7)||'fa',16);
    return`rgba(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)},0.9)`;

  function drawLabels(chart,horizontal){

  // ── 饼图3D效果（椭圆倾斜 + 厚度）
  function draw3DPie(canvasId,labels,data,colors){
    const canvas=document.getElementById(canvasId);
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.offsetWidth||canvas.parentElement.offsetWidth||300;
    const H=canvas.offsetHeight||220;
    canvas.width=W; canvas.height=H;

    const cx=W*0.38, cy=H*0.48;
    const rx=Math.min(W*0.28,H*0.38), ry=rx*0.55;
    const DEPTH=18;
    const tot=data.reduce((a,b)=>a+b,0);
    if(!tot){ctx.clearRect(0,0,W,H);return;}

    let startAngle=-Math.PI/2;
    const slices=data.map((v,i)=>({v,angle:v/tot*Math.PI*2,color:colors[i],label:labels[i]}));

    // 侧面（从下往上画，产生厚度）
    for(let d=DEPTH;d>=0;d--){
      let sa=-Math.PI/2;
      slices.forEach(s=>{
        const ea=sa+s.angle;
        const mid=(sa+ea)/2;
        if(mid>0&&mid<Math.PI){
          ctx.beginPath();
          ctx.moveTo(cx+Math.cos(sa)*rx, cy+Math.sin(sa)*ry+d);
          ctx.ellipse(cx,cy+d,rx,ry,0,sa,ea);
          ctx.lineTo(cx+Math.cos(ea)*rx, cy+Math.sin(ea)*ry);
          ctx.ellipse(cx,cy,rx,ry,0,ea,sa,true);
          ctx.closePath();
          ctx.fillStyle=darken(s.color,20+d);
          ctx.fill();
        }
        sa=ea;
      });
    }

    // 顶面
    let sa2=-Math.PI/2;
    slices.forEach(s=>{
      const ea=sa2+s.angle;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.ellipse(cx,cy,rx,ry,0,sa2,ea);
      ctx.closePath();
      ctx.fillStyle=s.color;
      ctx.fill();
      ctx.strokeStyle='rgba(15,17,23,0.4)';
      ctx.lineWidth=1;
      ctx.stroke();
      sa2=ea;
    });

    // 占比标签
    let sa3=-Math.PI/2;
    slices.forEach(s=>{
      const ea=sa3+s.angle;
      const pct=s.v/tot*100;
      if(pct>=4){
        const mid=(sa3+ea)/2;
        const lx=cx+Math.cos(mid)*rx*0.65;
        const ly=cy+Math.sin(mid)*ry*0.65;
        ctx.font='bold 11px "Noto Sans SC"';
        ctx.fillStyle='#fff';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText(fmtPct(pct),lx,ly);
      }
      sa3=ea;
    });

    // 图例（右侧）
    const legX=W*0.72, legY=cy-slices.length*10;
    slices.forEach((s,i)=>{
      const lx=legX, ly=legY+i*22;
      ctx.fillStyle=s.color;
      ctx.fillRect(lx,ly,12,12);
      ctx.font='11px "Noto Sans SC"';
      ctx.fillStyle='#9099b0';
      ctx.textAlign='left';
      ctx.textBaseline='top';
      ctx.fillText(s.label,lx+16,ly);
    });
  }

      {label:'上月',data:adValsPrev,backgroundColor:'#2a3f6f',borderWidth:0,borderRadius:0},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9099b0',font:{size:11}}},tooltip:{...tp,callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.raw)}`}}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#9099b0',font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555e7a',font:{size:10},callback:v=>fmt(v)}}
      }
    },
    plugins:[pseudo3DBar,labelPlugin3DV]
  });

  const costLabels=['技术开支','运营开支','商务开支','渠道开支','其他开支','充值损耗','广告损耗'];
  const costVals=[expT,expO,expB,expCh,expOt,lossC,lossA];
  const costPrev=[p_expT,p_expO,p_expB,p_expCh,p_expOt,p_lossC,p_lossA];
  const costColors=['#60a5fa','#4ade80','#a78bfa','#fbbf24','#2dd4bf','#f87171','#fb923c'];

  // 成本结构占比 — 3D饼图
  draw3DPie('chartCostPie',costLabels,costVals,costColors);

  // 成本开支 — 横向3D柱
  mkChart('chartCostBar',{
    type:'bar',
    data:{labels:costLabels,datasets:[{label:'实际金额',data:costVals,backgroundColor:costColors,borderWidth:0,borderRadius:0}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...tp,callbacks:{label:c=>`${fmt(c.raw)}`}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555e7a',font:{size:10},callback:v=>fmt(v)}},
        y:{grid:{display:false},ticks:{color:'#9099b0',font:{size:11}}}
      }
    },
    plugins:[pseudo3DHBar,labelPlugin3DH]
  });

  // 成本本月 vs 上月 — 竖3D柱
  mkChart('chartCostMom',{
    type:'bar',
    data:{labels:costLabels,datasets:[
      {label:'本月',data:costVals,backgroundColor:'#f87171',borderWidth:0,borderRadius:0},
      {label:'上月',data:costPrev,backgroundColor:'#6b2e2e',borderWidth:0,borderRadius:0},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9099b0',font:{size:11}}},tooltip:{...tp,callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.raw)}`}}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#9099b0',font:{size:10},maxRotation:35}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555e7a',font:{size:10},callback:v=>fmt(v)}}
      }
    },
    plugins:[pseudo3DBar,labelPlugin3DV]
  });
  },100);
}

// ═══════════════════════════════════
// 刷新
// ═══════════════════════════════════
async function refresh(){
  try{
    const [dailyJson,adJson,budgetJson]=await Promise.all([
      fetchGID(GID_DAILY),
      fetchGID(GID_AD).catch(()=>({table:{rows:[]}})),
      fetchGID(GID_BUDGET).catch(()=>({table:{rows:[]}}))
    ]);
    allRows=parseDailyRows(dailyJson);
    adRows=parseAdRows(adJson);
    budgetRows=parseBudgetRows(budgetJson);

    // 首次加载：若本月无数据，自动切换到最新有数据的月份
    if(allRows.length>0){
      const curRows=allRows.filter(r=>r.ymd>=filterFrom&&r.ymd<=filterTo);
      if(curRows.length===0){
        // 找最新一条数据的月份
        const latest=allRows[allRows.length-1];
        const d=new Date(latest.ymd);
        filterFrom=toYMD(new Date(d.getFullYear(),d.getMonth(),1));
        filterTo=toYMD(new Date(d.getFullYear(),d.getMonth()+1,0));
        document.getElementById('date-from').value=filterFrom;
        document.getElementById('date-to').value=filterTo;
        updateLabel();
      }
    }

    render();
    document.getElementById('upd').textContent='最后更新 '+new Date().toLocaleTimeString('zh-CN');
  }catch(e){
    allRows=[];adRows=[];budgetRows=[];
    render();
    console.error(e);
  }
}

// ═══════════════════════════════════
// 初始化
// ═══════════════════════════════════
(function init(){
  const t=new Date();
  filterFrom=toYMD(startOfMonth());
  filterTo=toYMD(t);
  document.getElementById('date-from').value=filterFrom;
  document.getElementById('date-to').value=filterTo;
  updateLabel();
})();

refresh();
setInterval(refresh,REFRESH_MS);
</script>
