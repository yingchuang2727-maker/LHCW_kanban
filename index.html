<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>领航财务BI看板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f5f3ee;
  --bg2: #ffffff;
  --bg3: #f0ede6;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans SC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

header {
  background:#2d4a1e; padding:0 32px; height:56px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.logo { font-size:17px; font-weight:700; color:#fff; }
.header-right { display:flex; align-items:center; gap:16px; }
.sync-badge { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.15); border-radius:20px; padding:4px 12px; font-size:12px; color:#fff; }
.sync-dot { width:6px; height:6px; border-radius:50%; background:#7fff7f; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#last-updated { font-size:11px; color:rgba(255,255,255,0.6); }

.period-bar { background:#fff; border-bottom:1px solid var(--border); padding:10px 32px; display:flex; align-items:center; gap:8px; }
.period-btn { padding:5px 16px; border-radius:20px; border:1px solid var(--border); background:transparent; font-size:13px; color:var(--text2); cursor:pointer; font-family:'Noto Sans SC',sans-serif; transition:all 0.15s; }
.period-btn.active { background:#2d4a1e; color:#fff; border-color:#2d4a1e; }

main { padding:24px 32px; max-width:1400px; margin:0 auto; }

.section-label { font-size:13px; font-weight:500; color:var(--text2); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.section-label::before { content:''; width:3px; height:14px; background:#2d4a1e; border-radius:2px; display:inline-block; }

.kpi-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:24px; }
.kpi-card { border-radius:10px; padding:18px 20px; color:#fff; }
.c1{background:#2d4a1e} .c2{background:#3a7d3a} .c3{background:#6B4226} .c4{background:#8B5E00} .c5{background:#5d3a1a}
.kpi-label { font-size:12px; color:rgba(255,255,255,0.7); margin-bottom:10px; }
.kpi-value { font-size:22px; font-weight:700; font-family:'JetBrains Mono',monospace; letter-spacing:-0.5px; }
.kpi-meta { font-size:11px; color:rgba(255,255,255,0.6); margin-top:8px; line-height:1.9; }
.hi { color:#7fff7f; font-weight:500; }
.hi-r { color:#ffaaaa; font-weight:500; }

.ind-grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
.ind-grid5 { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:24px; }
.ind-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px 18px; }
.ind-card.g { border-top:3px solid #3a7d3a; }
.ind-card.b { border-top:3px solid #6B4226; }
.ind-label { font-size:12px; color:var(--text2); margin-bottom:8px; }
.ind-value { font-size:20px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.ind-meta { font-size:11px; color:var(--text3); margin-top:6px; line-height:1.8; }
.rate { color:#2d6a2d; font-weight:500; }
.rate-r { color:#c0392b; font-weight:500; }

.charts-row { display:grid; grid-template-columns:1fr 320px; gap:16px; margin-bottom:24px; }
.chart-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:20px; }
.chart-title { font-size:13px; font-weight:500; margin-bottom:4px; }
.chart-sub { font-size:11px; color:var(--text3); margin-bottom:14px; }
.legend { display:flex; gap:14px; margin-bottom:10px; }
.leg { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text2); }
.leg-dot { width:10px; height:10px; border-radius:2px; }

.funnel-wrap { display:flex; flex-direction:column; gap:12px; margin-top:8px; }
.f-row-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:4px; }
.f-bar-bg { background:var(--bg3); border-radius:4px; height:26px; overflow:hidden; }
.f-bar { height:100%; border-radius:4px; display:flex; align-items:center; padding:0 10px; font-size:12px; font-weight:500; color:#fff; }
.fb1{background:#2d4a1e} .fb2{background:#3a7d3a} .fb3{background:#8B5E00} .fb4{background:#c0392b}

.table-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:24px; }
table { width:100%; border-collapse:collapse; }
thead tr { background:var(--bg3); }
th { padding:9px 12px; text-align:right; font-size:11px; font-weight:500; color:var(--text2); border-bottom:1px solid var(--border); white-space:nowrap; }
th:first-child { text-align:left; }
td { padding:8px 12px; text-align:right; border-bottom:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:11px; }
td:first-child { text-align:left; font-family:'Noto Sans SC',sans-serif; font-size:12px; color:var(--text2); }
tbody tr:last-child td { font-weight:700; background:var(--bg3); }
tbody tr:hover:not(:last-child) { background:#fafaf8; }
.pos{color:#2d6a2d} .neg{color:#c0392b}

.loading { text-align:center; padding:60px; color:var(--text2); }
.spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:#2d4a1e; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }
.err { background:#fdf0f0; border:1px solid #f5c6c6; border-radius:10px; padding:16px 20px; color:#c0392b; font-size:13px; margin:20px 0; line-height:1.7; }

footer { text-align:center; padding:20px; font-size:11px; color:var(--text3); border-top:1px solid var(--border); }
footer a { color:var(--text3); }
</style>
</head>
<body>

<header>
  <div class="logo">领航财务BI看板</div>
  <div class="header-right">
    <div id="last-updated">加载中...</div>
    <div class="sync-badge"><div class="sync-dot"></div>实时同步</div>
  </div>
</header>

<div class="period-bar">
  <button class="period-btn active" onclick="setPeriod(this,'month')">本月</button>
  <button class="period-btn" onclick="setPeriod(this,'week')">近7天</button>
  <button class="period-btn" onclick="setPeriod(this,'all')">全部</button>
</div>

<main>
  <div id="app"><div class="loading"><div class="spinner"></div>正在从 Google Sheets 加载数据...</div></div>
</main>

<footer>
  数据来源：Google Sheets · 领航财务BI模版 · 每60秒自动刷新 ·
  <a href="https://docs.google.com/spreadsheets/d/1JyXWDifCSfqXNVOwiS4xvLfQpmlLhW-GFsjSsqzJ7TY" target="_blank">查看原始表格</a>
</footer>

<script>
const SHEET_ID  = '1JyXWDifCSfqXNVOwiS4xvLfQpmlLhW-GFsjSsqzJ7TY';
const SHEET_GID = '877653223';
const REFRESH_MS = 60000;

let allRows = [], period = 'month', chart = null;

const fmt = v => {
  if (v===null||v===undefined||isNaN(v)) return '—';
  const n = parseFloat(v);
  if (Math.abs(n)>=10000000) return (n/10000000).toFixed(2)+'千万';
  if (Math.abs(n)>=10000)    return (n/10000).toFixed(1)+'万';
  return n.toLocaleString('zh-CN',{maximumFractionDigits:0});
};
const pct = v => isNaN(v)||!isFinite(v) ? '—' : parseFloat(v).toFixed(2)+'%';
const sum = (rows,k) => rows.reduce((s,r)=>s+(r[k]||0),0);
const pc  = v => parseFloat(v)>=0?'pos':'neg';

async function fetchSheet() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}&nocache=${Date.now()}`;
  const resp = await fetch(url);
  const text = await resp.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json;
}

function parseRows(json) {
  const result = [];
  for (const row of json.table.rows) {
    const c = row.c||[];
    const d = c[0]?.v;
    if (!d || String(d).includes('合计')||String(d).includes('日期')||String(d).includes('项')) continue;
    const g = i => (c[i]?.v!=null) ? parseFloat(c[i].v)||0 : 0;
    result.push({
      date: String(d),
      inc_charge:  g(4),  inc_ad: g(5),  inc_other: g(6),  inc_total: g(7),
      loss_channel:g(14), loss_ad:g(18),
      exp_tech:    g(24), exp_ops:g(25), exp_biz:   g(26),
      exp_channel: g(27), exp_other:g(28),exp_total: g(29),
      profit:      g(31),
      theo_charge: g(1),  theo_ad:g(2),  theo_total:g(3),
    });
  }
  return result;
}

function filtered() {
  if (period==='week') return allRows.slice(-7);
  if (period==='month') return allRows.slice(-31);
  return allRows;
}

function render() {
  const rows = filtered();
  const inc   = sum(rows,'inc_total');
  const exp   = sum(rows,'exp_total');
  const prof  = sum(rows,'profit');
  const margin= inc>0 ? prof/inc*100 : 0;
  const incC  = sum(rows,'inc_charge');
  const incA  = sum(rows,'inc_ad');
  const incO  = sum(rows,'inc_other');
  const lossC = sum(rows,'loss_channel');
  const lossA = sum(rows,'loss_ad');
  const expT  = sum(rows,'exp_tech');
  const expO  = sum(rows,'exp_ops');
  const expB  = sum(rows,'exp_biz');
  const expCh = sum(rows,'exp_channel');
  const expOt = sum(rows,'exp_other');

  const tRows = [...rows].reverse().map(r=>`
    <tr>
      <td>${r.date}</td>
      <td>${fmt(r.inc_total)}</td>
      <td>${fmt(r.inc_charge)}</td>
      <td>${fmt(r.inc_ad)}</td>
      <td>${fmt(r.loss_channel)}</td>
      <td>${fmt(r.exp_total)}</td>
      <td>${fmt(r.exp_channel)}</td>
      <td>${fmt(r.exp_tech)}</td>
      <td class="${pc(r.profit)}">${fmt(r.profit)}</td>
    </tr>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="section-label">总览</div>
    <div class="kpi-grid">
      <div class="kpi-card c1">
        <div class="kpi-label">总毛利润</div>
        <div class="kpi-value">${fmt(prof)}</div>
        <div class="kpi-meta">毛利率：<span class="${margin<0?'hi-r':'hi'}">${pct(margin)}</span></div>
      </div>
      <div class="kpi-card c2">
        <div class="kpi-label">总收入</div>
        <div class="kpi-value">${fmt(inc)}</div>
        <div class="kpi-meta">充值 ${fmt(incC)}<br>广告 ${fmt(incA)}</div>
      </div>
      <div class="kpi-card c3">
        <div class="kpi-label">总支出</div>
        <div class="kpi-value">${fmt(exp)}</div>
        <div class="kpi-meta">渠道 ${fmt(expCh)}<br>技术 ${fmt(expT)}</div>
      </div>
      <div class="kpi-card c4">
        <div class="kpi-label">通道损耗</div>
        <div class="kpi-value">${fmt(lossC)}</div>
        <div class="kpi-meta">占充值收入<br><span class="hi">${incC>0?pct(lossC/incC*100):'—'}</span></div>
      </div>
      <div class="kpi-card c5">
        <div class="kpi-label">广告损耗</div>
        <div class="kpi-value">${fmt(lossA)}</div>
        <div class="kpi-meta">占广告收入<br><span class="hi">${incA>0?pct(lossA/incA*100):'—'}</span></div>
      </div>
    </div>

    <div class="section-label">收入指标</div>
    <div class="ind-grid3">
      <div class="ind-card g"><div class="ind-label">充值收入</div><div class="ind-value">${fmt(incC)}</div><div class="ind-meta">占总收入：<span class="rate">${inc>0?pct(incC/inc*100):'—'}</span></div></div>
      <div class="ind-card g"><div class="ind-label">广告收入</div><div class="ind-value">${fmt(incA)}</div><div class="ind-meta">占总收入：<span class="rate">${inc>0?pct(incA/inc*100):'—'}</span></div></div>
      <div class="ind-card g"><div class="ind-label">其他收入</div><div class="ind-value">${fmt(incO)}</div><div class="ind-meta">占总收入：<span class="rate">${inc>0?pct(incO/inc*100):'—'}</span></div></div>
    </div>

    <div class="section-label">支出指标</div>
    <div class="ind-grid5">
      <div class="ind-card b"><div class="ind-label">技术开支</div><div class="ind-value">${fmt(expT)}</div><div class="ind-meta">占总支出：<span class="rate">${exp>0?pct(expT/exp*100):'—'}</span></div></div>
      <div class="ind-card b"><div class="ind-label">运营开支</div><div class="ind-value">${fmt(expO)}</div><div class="ind-meta">占总支出：<span class="rate">${exp>0?pct(expO/exp*100):'—'}</span></div></div>
      <div class="ind-card b"><div class="ind-label">商务开支</div><div class="ind-value">${fmt(expB)}</div><div class="ind-meta">占总支出：<span class="rate">${exp>0?pct(expB/exp*100):'—'}</span></div></div>
      <div class="ind-card b"><div class="ind-label">渠道开支</div><div class="ind-value">${fmt(expCh)}</div><div class="ind-meta">占总支出：<span class="${exp>0&&expCh/exp>0.5?'rate-r':'rate'}">${exp>0?pct(expCh/exp*100):'—'}</span></div></div>
      <div class="ind-card b"><div class="ind-label">其他支出</div><div class="ind-value">${fmt(expOt)}</div><div class="ind-meta">占总支出：<span class="rate">${exp>0?pct(expOt/exp*100):'—'}</span></div></div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">日收入 & 毛利趋势</div>
        <div class="chart-sub">${rows.length} 天数据</div>
        <div class="legend">
          <div class="leg"><div class="leg-dot" style="background:rgba(58,125,58,0.7)"></div>收入</div>
          <div class="leg"><div class="leg-dot" style="background:#2d4a1e"></div>毛利</div>
        </div>
        <div style="height:220px"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">转化漏斗</div>
        <div class="chart-sub">访客 → 付费转化</div>
        <div class="funnel-wrap">
          <div><div class="f-row-label"><span>访客</span><span>48,293</span></div><div class="f-bar-bg"><div class="f-bar fb1" style="width:100%">100%</div></div></div>
          <div><div class="f-row-label"><span>注册</span><span>18,340</span></div><div class="f-bar-bg"><div class="f-bar fb2" style="width:38%">38%</div></div></div>
          <div><div class="f-row-label"><span>试用</span><span>7,230</span></div><div class="f-bar-bg"><div class="f-bar fb3" style="width:15%">15%</div></div></div>
          <div><div class="f-row-label"><span>付费</span><span>1,772</span></div><div class="f-bar-bg"><div class="f-bar fb4" style="width:4%">4%</div></div></div>
        </div>
      </div>
    </div>

    <div class="section-label">每日明细</div>
    <div class="table-card">
      <table>
        <thead><tr>
          <th>日期</th><th>总收入</th><th>充值收入</th><th>广告收入</th>
          <th>通道损耗</th><th>总支出</th><th>渠道开支</th><th>技术开支</th><th>当日毛利</th>
        </tr></thead>
        <tbody>
          ${tRows}
          <tr>
            <td>合计</td>
            <td>${fmt(inc)}</td><td>${fmt(incC)}</td><td>${fmt(incA)}</td>
            <td>${fmt(lossC)}</td><td>${fmt(exp)}</td><td>${fmt(expCh)}</td><td>${fmt(expT)}</td>
            <td class="${pc(prof)}">${fmt(prof)}</td>
          </tr>
        </tbody>
      </table>
    </div>`;

  // Draw chart
  setTimeout(()=>{
    const ctx = document.getElementById('trendChart');
    if (!ctx) return;
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type:'bar',
      data:{
        labels: rows.map(r=>r.date),
        datasets:[
          {label:'收入', data:rows.map(r=>r.inc_total), backgroundColor:'rgba(58,125,58,0.65)', borderRadius:3, order:2},
          {label:'毛利', data:rows.map(r=>r.profit),    backgroundColor:rows.map(r=>r.profit>=0?'rgba(45,74,30,0.9)':'rgba(192,57,43,0.8)'), borderRadius:3, order:1}
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.raw)}`}}},
        scales:{
          x:{grid:{display:false}, ticks:{font:{size:10},color:'#999',maxRotation:45}},
          y:{grid:{color:'rgba(0,0,0,0.05)'}, ticks:{font:{size:10},color:'#999',callback:v=>fmt(v)}}
        }
      }
    });
  },100);
}

function setPeriod(btn, p) {
  period = p;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function refresh() {
  try {
    const json = await fetchSheet();
    allRows = parseRows(json);
    render();
    document.getElementById('last-updated').textContent = '最后更新 '+new Date().toLocaleTimeString('zh-CN');
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="err">❌ 数据加载失败：${e.message}<br><br>请确认 Google Sheets 已设为「知道链接的任何人可查看」</div>`;
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
