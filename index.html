<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>领航财务BI看板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1117;
  --bg2:#1a1d27;
  --bg3:#22263a;
  --bg4:#2a2f45;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;
  --text2:#9099b0;
  --text3:#555e7a;
  --green:#4ade80;
  --green-dim:rgba(74,222,128,0.12);
  --red:#f87171;
  --red-dim:rgba(248,113,113,0.12);
  --blue:#60a5fa;
  --blue-dim:rgba(96,165,250,0.12);
  --amber:#fbbf24;
  --amber-dim:rgba(251,191,36,0.12);
  --purple:#a78bfa;
  --purple-dim:rgba(167,139,250,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Header */
header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 28px;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#60a5fa,#a78bfa);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.logo-text{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.3px;}
.logo-sub{font-size:11px;color:var(--text3);}
.hdr-r{display:flex;align-items:center;gap:14px;}
.sync{display:flex;align-items:center;gap:6px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.25);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--green);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
#upd{font-size:11px;color:var(--text3);}

/* Period bar */
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:6px;}
.pbtn{padding:5px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;}
.pbtn:hover{border-color:var(--blue);color:var(--blue);}
.pbtn.active{background:var(--blue-dim);color:var(--blue);border-color:var(--blue);}

main{padding:20px 28px;max-width:1440px;margin:0 auto;}

/* Section label */
.sec{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:12px;letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.sec::before{content:'';width:3px;height:12px;background:var(--blue);border-radius:2px;display:inline-block;}

/* KPI cards */
.kg{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.kc{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:16px 18px;
  position:relative;overflow:hidden;
  transition:border-color 0.2s,transform 0.15s;
}
.kc:hover{border-color:var(--border2);transform:translateY(-1px);}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kc.blue::before{background:linear-gradient(90deg,#60a5fa,#818cf8);}
.kc.green::before{background:linear-gradient(90deg,#4ade80,#22d3ee);}
.kc.red::before{background:linear-gradient(90deg,#f87171,#fb923c);}
.kc.amber::before{background:linear-gradient(90deg,#fbbf24,#f59e0b);}
.kc.purple::before{background:linear-gradient(90deg,#a78bfa,#ec4899);}
.kl{font-size:11px;color:var(--text3);margin-bottom:10px;font-weight:500;}
.kv{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px;color:var(--text);}
.km{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.9;}
.hi{color:var(--green);font-weight:500;}
.hir{color:var(--red);font-weight:500;}
.hi-b{color:var(--blue);font-weight:500;}
.hi-a{color:var(--amber);font-weight:500;}

/* Indicator cards */
.ig3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.ig5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.ic{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:border-color 0.2s;}
.ic:hover{border-color:var(--border2);}
.ic.g{border-left:3px solid var(--green);}
.ic.b{border-left:3px solid var(--red);}
.il{font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:500;}
.iv{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);}
.im{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.8;}
.rt{color:var(--green);font-weight:500;}
.rtr{color:var(--red);font-weight:500;}

/* Charts */
.cr{display:grid;grid-template-columns:1fr 300px;gap:12px;margin-bottom:20px;}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.ct{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;}
.cs{font-size:11px;color:var(--text3);margin-bottom:14px;}
.leg{display:flex;gap:14px;margin-bottom:10px;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.ld{width:8px;height:8px;border-radius:2px;}

/* Funnel */
.fw{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.flbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px;}
.fbg{background:var(--bg3);border-radius:4px;height:24px;overflow:hidden;}
.fb{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:500;color:#fff;}
.fb1{background:linear-gradient(90deg,#60a5fa,#818cf8);}
.fb2{background:linear-gradient(90deg,#4ade80,#22d3ee);}
.fb3{background:linear-gradient(90deg,#fbbf24,#f59e0b);}
.fb4{background:linear-gradient(90deg,#f87171,#fb923c);}

/* Table */
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--bg3);}
th{padding:9px 12px;text-align:right;font-size:11px;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:0.03em;}
th:first-child{text-align:left;}
td{padding:8px 12px;text-align:right;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}
td:first-child{text-align:left;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:var(--text2);}
tbody tr:last-child td{font-weight:700;background:var(--bg3);color:var(--text);}
tbody tr:hover:not(:last-child){background:rgba(255,255,255,0.02);}
.pos{color:var(--green)!important;}
.neg{color:var(--red)!important;}

/* Loading / Error */
.loading{text-align:center;padding:80px 20px;color:var(--text2);}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--red-dim);border:1px solid rgba(248,113,113,0.25);border-radius:10px;padding:16px 20px;color:var(--red);font-size:13px;margin:20px 0;line-height:1.7;}

footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:8px;}
footer a{color:var(--text3);text-decoration:none;}
footer a:hover{color:var(--text2);}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">财</div>
    <div>
      <div class="logo-text">领航财务BI看板</div>
      <div class="logo-sub">实时数据同步</div>
    </div>
  </div>
  <div class="hdr-r">
    <div id="upd">加载中...</div>
    <div class="sync"><div class="dot"></div>实时同步</div>
  </div>
</header>

<div class="pbar">
  <button class="pbtn active" onclick="setPeriod(this,'all')">本月</button>
  <button class="pbtn" onclick="setPeriod(this,'15')">近15天</button>
  <button class="pbtn" onclick="setPeriod(this,'week')">近7天</button>
</div>

<main>
  <div id="app">
    <div class="loading"><div class="spinner"></div>正在从 Google Sheets 加载数据...</div>
  </div>
</main>

<footer>
  数据来源：Google Sheets · 领航财务BI模版 · 每60秒自动刷新 ·
  <a href="https://docs.google.com/spreadsheets/d/1JyXWDifCSfqXNVOwiS4xvLfQpmlLhW-GFsjSsqzJ7TY" target="_blank">查看原始表格</a>
</footer>

<script>
const SHEET_ID  = '1JyXWDifCSfqXNVOwiS4xvLfQpmlLhW-GFsjSsqzJ7TY';
const SHEET_GID = '877653223';
const REFRESH_MS = 60000;

const COL = {
  date:        1,
  inc_charge:  5,
  inc_ad:      6,
  inc_other:   7,
  inc_total:   8,
  loss_channel:21,
  loss_ad:     22,
  exp_tech:    24,
  exp_ops:     25,
  exp_biz:     26,
  exp_channel: 27,
  exp_other:   28,
  exp_total:   29,
  profit:      33,
};

let allRows=[], period='all', chart=null;

const fmt = v => {
  if(v===null||v===undefined||isNaN(v))return'—';
  const n=parseFloat(v);
  if(Math.abs(n)>=10000000)return(n/10000000).toFixed(2)+'千万';
  if(Math.abs(n)>=10000)return(n/10000).toFixed(1)+'万';
  return n.toLocaleString('zh-CN',{maximumFractionDigits:0});
};
const pct = (a,b) => b&&b!==0?(a/b*100).toFixed(2)+'%':'—';
const sum = (rows,k) => rows.reduce((s,r)=>s+(r[k]||0),0);
const pc  = v => parseFloat(v)>=0?'pos':'neg';

async function fetchSheet(){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}&nocache=${Date.now()}`;
  const resp=await fetch(url);
  const text=await resp.text();
  const json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json;
}

function isDataRow(c){
  const d=c[COL.date]?.v;
  if(!d)return false;
  const s=String(d);
  if(['合计','日期','项','理论','实际','月份','-','目标','进度','剩余'].some(k=>s.includes(k)))return false;
  return c[COL.inc_total]?.v!=null||c[COL.inc_charge]?.v!=null;
}

function parseRows(json){
  const result=[];
  for(const row of json.table.rows){
    const c=row.c||[];
    if(!isDataRow(c))continue;
    const g=i=>(c[i]?.v!=null)?parseFloat(c[i].v)||0:0;
    result.push({
      date:         String(c[COL.date].v),
      inc_charge:   g(COL.inc_charge),
      inc_ad:       g(COL.inc_ad),
      inc_other:    g(COL.inc_other),
      inc_total:    g(COL.inc_total),
      loss_channel: g(COL.loss_channel),
      loss_ad:      g(COL.loss_ad),
      exp_tech:     g(COL.exp_tech),
      exp_ops:      g(COL.exp_ops),
      exp_biz:      g(COL.exp_biz),
      exp_channel:  g(COL.exp_channel),
      exp_other:    g(COL.exp_other),
      exp_total:    g(COL.exp_total),
      profit:       g(COL.profit),
    });
  }
  return result;
}

function filtered(){
  if(period==='week')return allRows.slice(-7);
  if(period==='15')return allRows.slice(-15);
  return allRows;
}

function render(){
  const rows=filtered();
  if(!rows.length){
    document.getElementById('app').innerHTML='<div class="err">⚠️ 未读取到数据，请确认 Google Sheets 权限已设为公开。</div>';
    return;
  }

  const inc   =sum(rows,'inc_total');
  const exp   =sum(rows,'exp_total');
  const prof  =sum(rows,'profit');
  const incC  =sum(rows,'inc_charge');
  const incA  =sum(rows,'inc_ad');
  const incO  =sum(rows,'inc_other');
  const lossC =sum(rows,'loss_channel');
  const lossA =sum(rows,'loss_ad');
  const expT  =sum(rows,'exp_tech');
  const expO  =sum(rows,'exp_ops');
  const expB  =sum(rows,'exp_biz');
  const expCh =sum(rows,'exp_channel');
  const expOt =sum(rows,'exp_other');
  const margin=inc>0?prof/inc*100:0;

  const tRows=[...rows].reverse().map(r=>`
    <tr>
      <td>${r.date}</td>
      <td>${fmt(r.inc_total)}</td>
      <td>${fmt(r.inc_charge)}</td>
      <td>${fmt(r.inc_ad)}</td>
      <td class="hi-a">${fmt(r.loss_channel)}</td>
      <td>${fmt(r.exp_total)}</td>
      <td>${fmt(r.exp_channel)}</td>
      <td>${fmt(r.exp_tech)}</td>
      <td class="${pc(r.profit)}">${fmt(r.profit)}</td>
    </tr>`).join('');

  document.getElementById('app').innerHTML=`
    <div class="sec">总览</div>
    <div class="kg">
      <div class="kc blue">
        <div class="kl">总毛利润</div>
        <div class="kv">${fmt(prof)}</div>
        <div class="km">毛利率：<span class="${margin<0?'hir':'hi'}">${margin.toFixed(2)}%</span></div>
      </div>
      <div class="kc green">
        <div class="kl">总收入</div>
        <div class="kv">${fmt(inc)}</div>
        <div class="km">充值 ${fmt(incC)}<br>广告 ${fmt(incA)}</div>
      </div>
      <div class="kc red">
        <div class="kl">总支出</div>
        <div class="kv">${fmt(exp)}</div>
        <div class="km">渠道 ${fmt(expCh)}<br>技术 ${fmt(expT)}</div>
      </div>
      <div class="kc amber">
        <div class="kl">通道损耗</div>
        <div class="kv">${fmt(lossC)}</div>
        <div class="km">占充值收入<br><span class="hi-a">${pct(lossC,incC)}</span></div>
      </div>
      <div class="kc purple">
        <div class="kl">广告损耗</div>
        <div class="kv">${fmt(lossA)}</div>
        <div class="km">占广告收入<br><span class="hi-a">${pct(lossA,incA)}</span></div>
      </div>
    </div>

    <div class="sec">收入指标</div>
    <div class="ig3">
      <div class="ic g">
        <div class="il">充值收入</div>
        <div class="iv">${fmt(incC)}</div>
        <div class="im">占总收入：<span class="rt">${pct(incC,inc)}</span></div>
      </div>
      <div class="ic g">
        <div class="il">广告收入</div>
        <div class="iv">${fmt(incA)}</div>
        <div class="im">占总收入：<span class="rt">${pct(incA,inc)}</span></div>
      </div>
      <div class="ic g">
        <div class="il">其他收入</div>
        <div class="iv">${fmt(incO)}</div>
        <div class="im">占总收入：<span class="rt">${pct(incO,inc)}</span></div>
      </div>
    </div>

    <div class="sec">支出指标</div>
    <div class="ig5">
      <div class="ic b"><div class="il">技术开支</div><div class="iv">${fmt(expT)}</div><div class="im">占总支出：<span class="rtr">${pct(expT,exp)}</span></div></div>
      <div class="ic b"><div class="il">运营开支</div><div class="iv">${fmt(expO)}</div><div class="im">占总支出：<span class="rtr">${pct(expO,exp)}</span></div></div>
      <div class="ic b"><div class="il">商务开支</div><div class="iv">${fmt(expB)}</div><div class="im">占总支出：<span class="rtr">${pct(expB,exp)}</span></div></div>
      <div class="ic b"><div class="il">渠道开支</div><div class="iv">${fmt(expCh)}</div><div class="im">占总支出：<span class="rtr">${pct(expCh,exp)}</span></div></div>
      <div class="ic b"><div class="il">其他支出</div><div class="iv">${fmt(expOt)}</div><div class="im">占总支出：<span class="rtr">${pct(expOt,exp)}</span></div></div>
    </div>

    <div class="cr">
      <div class="cc">
        <div class="ct">日收入 & 毛利趋势</div>
        <div class="cs">${rows.length} 天数据</div>
        <div class="leg">
          <div class="li"><div class="ld" style="background:#60a5fa"></div>收入</div>
          <div class="li"><div class="ld" style="background:#4ade80"></div>毛利（正）</div>
          <div class="li"><div class="ld" style="background:#f87171"></div>毛利（负）</div>
        </div>
        <div style="height:220px"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="cc">
        <div class="ct">转化漏斗</div>
        <div class="cs">访客 → 付费转化</div>
        <div class="fw">
          <div><div class="flbl"><span>访客</span><span>48,293</span></div><div class="fbg"><div class="fb fb1" style="width:100%">100%</div></div></div>
          <div><div class="flbl"><span>注册</span><span>18,340</span></div><div class="fbg"><div class="fb fb2" style="width:38%">38%</div></div></div>
          <div><div class="flbl"><span>试用</span><span>7,230</span></div><div class="fbg"><div class="fb fb3" style="width:15%">15%</div></div></div>
          <div><div class="flbl"><span>付费</span><span>1,772</span></div><div class="fbg"><div class="fb fb4" style="width:4%">4%</div></div></div>
        </div>
      </div>
    </div>

    <div class="sec">每日明细</div>
    <div class="tc">
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>日期</th><th>总收入</th><th>充值收入</th><th>广告收入</th>
            <th>通道损耗</th><th>总支出</th><th>渠道开支</th><th>技术开支</th><th>当日毛利</th>
          </tr></thead>
          <tbody>
            ${tRows}
            <tr>
              <td>合计</td>
              <td>${fmt(inc)}</td><td>${fmt(incC)}</td><td>${fmt(incA)}</td>
              <td class="hi-a">${fmt(lossC)}</td><td>${fmt(exp)}</td><td>${fmt(expCh)}</td><td>${fmt(expT)}</td>
              <td class="${pc(prof)}">${fmt(prof)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;

  setTimeout(()=>{
    const ctx=document.getElementById('trendChart');
    if(!ctx)return;
    if(chart)chart.destroy();
    chart=new Chart(ctx,{
      type:'bar',
      data:{
        labels:rows.map(r=>r.date),
        datasets:[
          {
            label:'收入',
            data:rows.map(r=>r.inc_total),
            backgroundColor:'rgba(96,165,250,0.3)',
            borderColor:'rgba(96,165,250,0.8)',
            borderWidth:1,
            borderRadius:3,
            order:2
          },
          {
            label:'毛利',
            data:rows.map(r=>r.profit),
            backgroundColor:rows.map(r=>r.profit>=0?'rgba(74,222,128,0.7)':'rgba(248,113,113,0.7)'),
            borderRadius:3,
            order:1
          }
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'rgba(26,29,39,0.95)',
            borderColor:'rgba(255,255,255,0.1)',
            borderWidth:1,
            titleColor:'#9099b0',
            bodyColor:'#e8eaf0',
            callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.raw)}`}
          }
        },
        scales:{
          x:{
            grid:{color:'rgba(255,255,255,0.04)'},
            ticks:{font:{size:10},color:'#555e7a',maxRotation:45}
          },
          y:{
            grid:{color:'rgba(255,255,255,0.04)'},
            ticks:{font:{size:10},color:'#555e7a',callback:v=>fmt(v)}
          }
        }
      }
    });
  },100);
}

function setPeriod(btn,p){
  period=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function refresh(){
  try{
    const json=await fetchSheet();
    allRows=parseRows(json);
    render();
    document.getElementById('upd').textContent='最后更新 '+new Date().toLocaleTimeString('zh-CN');
  }catch(e){
    document.getElementById('app').innerHTML=
      `<div class="err">❌ 数据加载失败：${e.message}<br><br>请确认 Google Sheets 已设为「知道链接的任何人可查看」</div>`;
  }
}

refresh();
setInterval(refresh,REFRESH_MS);
</script>
</body>
</html>
