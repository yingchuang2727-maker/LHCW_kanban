<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>领航财务BI看板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--bg4:#2a2f45;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--text2:#9099b0;--text3:#555e7a;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;--amber:#fbbf24;--purple:#a78bfa;--teal:#2dd4bf;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* Header */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#60a5fa,#a78bfa);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.logo-text{font-size:15px;font-weight:700;color:var(--text);}
.logo-sub{font-size:11px;color:var(--text3);}
.hdr-r{display:flex;align-items:center;gap:14px;}
.sync{display:flex;align-items:center;gap:6px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.25);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--green);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
#upd{font-size:11px;color:var(--text3);}
/* Filter */
.filter-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.quick-btns{display:flex;gap:4px;}
.qbtn{padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;}
.qbtn:hover{border-color:var(--blue);color:var(--blue);}
.qbtn.active{background:rgba(96,165,250,0.15);color:var(--blue);border-color:var(--blue);}
.divider{width:1px;height:24px;background:var(--border2);margin:0 4px;}
.date-range{display:flex;align-items:center;gap:8px;}
.date-input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text);font-family:'Noto Sans SC',sans-serif;outline:none;color-scheme:dark;}
.date-input:focus{border-color:var(--blue);}
.confirm-btn{padding:5px 14px;border-radius:6px;background:var(--blue);border:none;font-size:12px;color:#fff;font-weight:500;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.range-label{font-size:11px;color:var(--text3);}
/* Main */
main{padding:20px 28px;max-width:1440px;margin:0 auto;}
.sec{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:12px;letter-spacing:0.06em;display:flex;align-items:center;gap:8px;}
.sec::before{content:'';width:3px;height:12px;background:var(--blue);border-radius:2px;display:inline-block;}
/* KPI 5-col */
.kg5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.kg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.kg2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
.kc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.15s;}
.kc:hover{border-color:var(--border2);transform:translateY(-1px);}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0;}
.kc.c-blue::before{background:linear-gradient(90deg,#60a5fa,#818cf8);}
.kc.c-green::before{background:linear-gradient(90deg,#4ade80,#22d3ee);}
.kc.c-red::before{background:linear-gradient(90deg,#f87171,#fb923c);}
.kc.c-amber::before{background:linear-gradient(90deg,#fbbf24,#f59e0b);}
.kc.c-purple::before{background:linear-gradient(90deg,#a78bfa,#ec4899);}
.kc.c-teal::before{background:linear-gradient(90deg,#2dd4bf,#60a5fa);}
.kc.c-orange::before{background:linear-gradient(90deg,#fb923c,#f87171);}
.kl{font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:500;}
.kv{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px;color:var(--text);}
.kv-sm{font-size:16px;}
.kmeta{margin-top:10px;display:flex;flex-direction:column;gap:4px;}
.kmeta-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;}
.kmeta-label{color:var(--text3);}
.kmeta-val{font-family:'JetBrains Mono',monospace;font-size:11px;}
.pos{color:var(--green)!important;}
.neg{color:var(--red)!important;}
.neu{color:var(--text2)!important;}
.hi-a{color:var(--amber);}
/* Chart cards */
.chart-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.chart-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px;}
.chart-row-32{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:24px;}
.chart-row-23{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:24px;}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.ct{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.cs{font-size:11px;color:var(--text3);margin-bottom:14px;}
/* Progress bars (horizontal) */
.prog-list{display:flex;flex-direction:column;gap:14px;margin-top:4px;}
.prog-item{}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-name{font-size:12px;color:var(--text2);}
.prog-vals{display:flex;gap:8px;align-items:center;}
.prog-pct{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.prog-num{font-size:11px;color:var(--text3);}
.prog-bg{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;}
.prog-bar{height:100%;border-radius:4px;transition:width 0.6s ease;}
.bar-green{background:linear-gradient(90deg,#4ade80,#22d3ee);}
.bar-blue{background:linear-gradient(90deg,#60a5fa,#818cf8);}
.bar-red{background:linear-gradient(90deg,#f87171,#fb923c);}
.bar-amber{background:linear-gradient(90deg,#fbbf24,#f59e0b);}
.bar-purple{background:linear-gradient(90deg,#a78bfa,#ec4899);}
.bar-teal{background:linear-gradient(90deg,#2dd4bf,#60a5fa);}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:8px;}
footer a{color:var(--text3);text-decoration:none;}
.err-banner{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:8px;padding:10px 16px;font-size:12px;color:var(--amber);margin-bottom:16px;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">财</div>
    <div><div class="logo-text">领航财务BI看板</div><div class="logo-sub">实时数据同步</div></div>
  </div>
  <div class="hdr-r">
    <div id="upd">加载中...</div>
    <div class="sync"><div class="dot"></div>实时同步</div>
  </div>
</header>

<div class="filter-bar">
  <div class="quick-btns">
    <button class="qbtn" onclick="setQuick(this,'today')">今日</button>
    <button class="qbtn" onclick="setQuick(this,'yesterday')">昨日</button>
    <button class="qbtn" onclick="setQuick(this,'week')">本周</button>
    <button class="qbtn" onclick="setQuick(this,'lastmonth')">上月</button>
    <button class="qbtn active" onclick="setQuick(this,'month')">本月</button>
  </div>
  <div class="divider"></div>
  <div class="date-range">
    <input type="date" class="date-input" id="date-from">
    <span style="color:var(--text3);font-size:12px">→</span>
    <input type="date" class="date-input" id="date-to">
    <button class="confirm-btn" onclick="applyCustomRange()">确定</button>
  </div>
  <div class="range-label" id="range-label"></div>
</div>

<main id="main-content">
  <!-- 渲染区 -->
</main>

<footer>
  数据来源：Google Sheets · 领航财务BI模版 · 每60秒自动刷新 ·
  <a href="https://docs.google.com/spreadsheets/d/1JyXWDifCSfqXNVOwiS4xvLfQpmlLhW-GFsjSsqzJ7TY" target="_blank">查看原始表格</a>
</footer>

<script>
// ═══════════════════════════════════════════
// 配置
// ═══════════════════════════════════════════
const SHEET_ID   = '1JyXWDifCSfqXNVOwiS4xvLfQpmlLhW-GFsjSsqzJ7TY';
const GID_DAILY  = '877653223';   // 日数据汇整
const GID_BUDGET = '1005558888';  // 预算/目标
const GID_ADTYPE = '1130613369';  // 广告类型明细
const REFRESH_MS = 60000;

// 日数据列索引 (0-based, 含空列)
const C = {
  date:1, inc_charge:5, inc_ad:6, inc_other:7, inc_total:8,
  loss_channel:21, loss_ad:22,
  exp_tech:24, exp_ops:25, exp_biz:26, exp_channel:27, exp_other:28, exp_total:29,
  revenue:31, expense:32, profit:33
};

// 3月预算（从预算Sheet读取，暂时硬编码，后续可动态读取）
const BUDGET = {
  inc_charge: 27278000, inc_ad: 38000000, inc_other: 0, inc_total: 65278000,
  exp_tech: 5824000, exp_ops: 2956000, exp_biz: 1200000, exp_channel: 17500000, exp_other: 0, exp_total: 27480000,
  profit_target: 10520000
};

// 广告类型颜色
const AD_TYPES = ['棋牌','约炮','播放器','直播','春药','成人游戏'];
const AD_COLORS = ['#60a5fa','#f87171','#4ade80','#fbbf24','#a78bfa','#2dd4bf'];

// ═══════════════════════════════════════════
// 状态
// ═══════════════════════════════════════════
let allRows=[], adTypeRows=[], filterFrom=null, filterTo=null;
let charts={};

// ═══════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════
const toYMD = d => {
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const fmt = v => {
  if(v===null||v===undefined||isNaN(v)||v===0)return'0';
  const n=parseFloat(v);
  if(Math.abs(n)>=10000000)return(n/10000000).toFixed(2)+'千万';
  if(Math.abs(n)>=10000)return(n/10000).toFixed(1)+'万';
  return n.toLocaleString('zh-CN',{maximumFractionDigits:0});
};
const fmtPct = v => {
  if(!v||isNaN(v))return'0.00%';
  return parseFloat(v).toFixed(2)+'%';
};
const pctOf = (a,b) => b&&b!==0 ? (a/b*100) : 0;
const pctStr = (a,b) => fmtPct(pctOf(a,b));
const sum = (rows,k) => rows.reduce((s,r)=>s+(r[k]||0),0);
const posClass = v => v>0?'pos':v<0?'neg':'neu';

function parseGSheetDate(v){
  if(!v)return null;
  const s=String(v);
  const m=s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if(m)return new Date(parseInt(m[1]),parseInt(m[2]),parseInt(m[3]));
  if(s.match(/^\d{4}-\d{1,2}-\d{1,2}$/)){const p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
  return null;
}

function startOfMonth(){const d=new Date();d.setDate(1);d.setHours(0,0,0,0);return d;}
function startOfLastMonth(){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);d.setHours(0,0,0,0);return d;}
function endOfLastMonth(){const d=new Date();d.setDate(0);d.setHours(23,59,59,999);return d;}
function startOfWeek(){const d=new Date();d.setDate(d.getDate()-((d.getDay()+6)%7));d.setHours(0,0,0,0);return d;}

// ═══════════════════════════════════════════
// 数据获取
// ═══════════════════════════════════════════
async function fetchGID(gid){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}&nocache=${Date.now()}`;
  const resp=await fetch(url);
  const text=await resp.text();
  return JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
}

function parseDailyRows(json){
  const result=[];
  for(const row of json.table.rows){
    const c=row.c||[];
    const cell=c[C.date];
    if(!cell?.v)continue;
    const s=String(cell.v);
    if(!s.startsWith('Date('))continue;
    const g=i=>(c[i]?.v!=null)?parseFloat(c[i].v)||0:0;
    const dateObj=parseGSheetDate(s);
    result.push({
      date: cell.f||toYMD(dateObj),
      ymd:  dateObj?toYMD(dateObj):null,
      inc_charge:g(C.inc_charge), inc_ad:g(C.inc_ad),
      inc_other:g(C.inc_other),   inc_total:g(C.inc_total),
      loss_channel:g(C.loss_channel), loss_ad:g(C.loss_ad),
      exp_tech:g(C.exp_tech), exp_ops:g(C.exp_ops),
      exp_biz:g(C.exp_biz),   exp_channel:g(C.exp_channel),
      exp_other:g(C.exp_other), exp_total:g(C.exp_total),
      profit:g(C.profit),
    });
  }
  return result;
}

function parseAdTypeRows(json){
  // 列: 0=空,1=月份,2=日期,3=产品归属,4=广告类型,5=RMB收款
  const result=[];
  for(const row of json.table.rows){
    const c=row.c||[];
    const dateCell=c[2];
    const typeCell=c[4];
    const rmbCell =c[5];
    if(!dateCell?.v||!typeCell?.v||!rmbCell?.v)continue;
    const dateObj=parseGSheetDate(String(dateCell.v));
    if(!dateObj)continue;
    result.push({
      ymd:  toYMD(dateObj),
      type: String(typeCell.v),
      rmb:  parseFloat(rmbCell.v)||0,
    });
  }
  return result;
}

// ═══════════════════════════════════════════
// 筛选
// ═══════════════════════════════════════════
function filtered(){
  return allRows.filter(r=>{
    if(!r.ymd)return true;
    if(filterFrom&&r.ymd<filterFrom)return false;
    if(filterTo  &&r.ymd>filterTo  )return false;
    return true;
  });
}
function filteredAdType(){
  return adTypeRows.filter(r=>{
    if(filterFrom&&r.ymd<filterFrom)return false;
    if(filterTo  &&r.ymd>filterTo  )return false;
    return true;
  });
}

// ═══════════════════════════════════════════
// 时间筛选
// ═══════════════════════════════════════════
function setQuick(btn,type){
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const t=new Date();
  if(type==='today'){filterFrom=filterTo=toYMD(t);}
  else if(type==='yesterday'){const y=new Date(t);y.setDate(y.getDate()-1);filterFrom=filterTo=toYMD(y);}
  else if(type==='week'){filterFrom=toYMD(startOfWeek());filterTo=toYMD(t);}
  else if(type==='month'){filterFrom=toYMD(startOfMonth());filterTo=toYMD(t);}
  else if(type==='lastmonth'){filterFrom=toYMD(startOfLastMonth());filterTo=toYMD(endOfLastMonth());}
  document.getElementById('date-from').value=filterFrom;
  document.getElementById('date-to').value=filterTo;
  updateLabel();render();
}
function applyCustomRange(){
  filterFrom=document.getElementById('date-from').value;
  filterTo=document.getElementById('date-to').value;
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  updateLabel();render();
}
function updateLabel(){
  document.getElementById('range-label').textContent=filterFrom&&filterTo?`${filterFrom} ~ ${filterTo}`:'';
}

// ═══════════════════════════════════════════
// 图表工具
// ═══════════════════════════════════════════
function makeChart(id,config){
  if(charts[id])charts[id].destroy();
  const ctx=document.getElementById(id);
  if(!ctx)return;
  charts[id]=new Chart(ctx,config);
}
const chartDefaults={
  color:'#9099b0',
  plugins:{legend:{labels:{color:'#9099b0',font:{size:11}}}},
  scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555e7a',font:{size:10}}},
          y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555e7a',font:{size:10}}}}
};
const tooltipDefaults={backgroundColor:'rgba(26,29,39,0.95)',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#9099b0',bodyColor:'#e8eaf0'};

// ═══════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════
function render(){
  const rows=filtered();
  const adRows=filteredAdType();

  // 汇总数据
  const inc    = sum(rows,'inc_total');
  const incC   = sum(rows,'inc_charge');
  const incA   = sum(rows,'inc_ad');
  const incO   = sum(rows,'inc_other');
  const exp    = sum(rows,'exp_total');
  const expT   = sum(rows,'exp_tech');
  const expO   = sum(rows,'exp_ops');
  const expB   = sum(rows,'exp_biz');
  const expCh  = sum(rows,'exp_channel');
  const expOt  = sum(rows,'exp_other');
  const lossC  = sum(rows,'loss_channel');
  const lossA  = sum(rows,'loss_ad');
  const prof   = sum(rows,'profit');
  const margin = pctOf(prof,inc);

  // 环比（上月同期，暂时用0）
  const mom_prof=0, mom_inc=0, mom_exp=0, mom_incC=0, mom_incA=0, mom_incO=0;
  const mom_expT=0, mom_expO=0, mom_expB=0, mom_expCh=0, mom_expOt=0;
  const mom_lossC=0, mom_lossA=0;

  // 广告类型汇总
  const adByType={};
  AD_TYPES.forEach(t=>adByType[t]=0);
  adRows.forEach(r=>{ if(adByType[r.type]!==undefined)adByType[r.type]+=r.rmb; });
  const adTypeVals=AD_TYPES.map(t=>adByType[t]);

  // 月环比箭头
  const momArrow=(v,prev)=>{
    if(!prev||prev===0)return`<span class="neu">—</span>`;
    const pct=((v-prev)/Math.abs(prev)*100).toFixed(1);
    return pct>=0?`<span class="pos">▲${pct}%</span>`:`<span class="neg">▼${Math.abs(pct)}%</span>`;
  };

  const main=document.getElementById('main-content');
  main.innerHTML=`
  <!-- ① 总览 -->
  <div class="sec">总览</div>
  <div class="kg5">
    <div class="kc c-blue">
      <div class="kl">总毛利润</div>
      <div class="kv">${fmt(prof)}</div>
      <div class="kmeta">
        <div class="kmeta-row"><span class="kmeta-label">毛利率</span><span class="kmeta-val ${posClass(margin)}">${fmtPct(margin)}</span></div>
        <div class="kmeta-row"><span class="kmeta-label">环比</span>${momArrow(prof,mom_prof)}</div>
        <div class="kmeta-row"><span class="kmeta-label">目标达成</span><span class="kmeta-val ${posClass(prof-BUDGET.profit_target)}">${pctStr(prof,BUDGET.profit_target)}</span></div>
      </div>
    </div>
    <div class="kc c-green">
      <div class="kl">总收入</div>
      <div class="kv">${fmt(inc)}</div>
      <div class="kmeta">
        <div class="kmeta-row"><span class="kmeta-label">环比</span>${momArrow(inc,mom_inc)}</div>
        <div class="kmeta-row"><span class="kmeta-label">目标达成</span><span class="kmeta-val">${pctStr(inc,BUDGET.inc_total)}</span></div>
      </div>
    </div>
    <div class="kc c-red">
      <div class="kl">总支出</div>
      <div class="kv">${fmt(exp)}</div>
      <div class="kmeta">
        <div class="kmeta-row"><span class="kmeta-label">环比</span>${momArrow(exp,mom_exp)}</div>
        <div class="kmeta-row"><span class="kmeta-label">预算消耗</span><span class="kmeta-val">${pctStr(exp,BUDGET.exp_total)}</span></div>
      </div>
    </div>
    <div class="kc c-amber">
      <div class="kl">目标销售达成率</div>
      <div class="kv kv-sm">${pctStr(inc,BUDGET.inc_total)}</div>
      <div class="kmeta">
        <div class="kmeta-row"><span class="kmeta-label">实际</span><span class="kmeta-val">${fmt(inc)}</span></div>
        <div class="kmeta-row"><span class="kmeta-label">目标</span><span class="kmeta-val">${fmt(BUDGET.inc_total)}</span></div>
      </div>
    </div>
    <div class="kc c-purple">
      <div class="kl">预算消耗使用率</div>
      <div class="kv kv-sm">${pctStr(exp,BUDGET.exp_total)}</div>
      <div class="kmeta">
        <div class="kmeta-row"><span class="kmeta-label">实际</span><span class="kmeta-val">${fmt(exp)}</span></div>
        <div class="kmeta-row"><span class="kmeta-label">预算</span><span class="kmeta-val">${fmt(BUDGET.exp_total)}</span></div>
      </div>
    </div>
  </div>

  <!-- ② 收入指标 -->
  <div class="sec">收入指标</div>
  <div class="kg3">
    <div class="kc c-green">
      <div class="kl">充值收入</div>
      <div class="kv">${fmt(incC)}</div>
      <div class="kmeta">
        <div class="kmeta-row"><span class="kmeta-label">完成比例</span><span class="kmeta-val">${pctStr(incC,BUDGET.inc_charge)}</span></div>
        <div class="kmeta-row"><span class="kmeta-label">目标</span><span class="kmeta-val">${fmt(BUDGET.inc_charge)}</span></div>
        <div class="kmeta-row"><span class="kmeta-label">环比</span>${momArrow(incC,mom_incC)}</div>
      </div>
    </div>
    <div class="kc c-green">
      <div class="kl">广告收入</div>
      <div class="kv">${fmt(incA)}</div>
      <div class="kmeta">
        <div class="kmeta-row"><span class="kmeta-label">完成比例</span><span class="kmeta-val">${pctStr(incA,BUDGET.inc_ad)}</span></div>
        <div class="kmeta-row"><span class="kmeta-label">目标</span><span class="kmeta-val">${fmt(BUDGET.inc_ad)}</span></div>
        <div class="kmeta-row"><span class="kmeta-label">环比</span>${momArrow(incA,mom_incA)}</div>
      </div>
    </div>
    <div class="kc c-teal">
      <div class="kl">其他收入</div>
      <div class="kv">${fmt(incO)}</div>
      <div class="kmeta">
        <div class="kmeta-row"><span class="kmeta-label">完成比例</span><span class="kmeta-val">${BUDGET.inc_other>0?pctStr(incO,BUDGET.inc_other):'—'}</span></div>
        <div class="kmeta-row"><span class="kmeta-label">环比</span>${momArrow(incO,mom_incO)}</div>
      </div>
    </div>
  </div>

  <!-- ③ 支出指标 -->
  <div class="sec">支出指标</div>
  <div class="kg5">
    ${[
      ['技术开支','c-red',expT,BUDGET.exp_tech,mom_expT],
      ['运营开支','c-red',expO,BUDGET.exp_ops,mom_expO],
      ['商务开支','c-red',expB,BUDGET.exp_biz,mom_expB],
      ['渠道开支','c-red',expCh,BUDGET.exp_channel,mom_expCh],
      ['其他开支','c-orange',expOt,BUDGET.exp_other,mom_expOt],
    ].map(([label,cls,val,budget,mom])=>`
      <div class="kc ${cls}">
        <div class="kl">${label}</div>
        <div class="kv kv-sm">${fmt(val)}</div>
        <div class="kmeta">
          <div class="kmeta-row"><span class="kmeta-label">预算</span><span class="kmeta-val">${fmt(budget)}</span></div>
          <div class="kmeta-row"><span class="kmeta-label">使用率</span><span class="kmeta-val ${budget>0&&val/budget>0.9?'neg':''}">${budget>0?pctStr(val,budget):'—'}</span></div>
          <div class="kmeta-row"><span class="kmeta-label">环比</span>${momArrow(val,mom)}</div>
        </div>
      </div>`).join('')}
  </div>

  <!-- ④ 损耗指标 -->
  <div class="sec">损耗指标</div>
  <div class="kg2">
    <div class="kc c-amber">
      <div class="kl">充值损耗</div>
      <div class="kv">${fmt(lossC)}</div>
      <div class="kmeta">
        <div class="kmeta-row"><span class="kmeta-label">占充值收入</span><span class="kmeta-val hi-a">${pctStr(lossC,incC)}</span></div>
        <div class="kmeta-row"><span class="kmeta-label">环比</span>${momArrow(lossC,mom_lossC)}</div>
      </div>
    </div>
    <div class="kc c-amber">
      <div class="kl">广告损耗</div>
      <div class="kv">${fmt(lossA)}</div>
      <div class="kmeta">
        <div class="kmeta-row"><span class="kmeta-label">占广告收入</span><span class="kmeta-val hi-a">${pctStr(lossA,incA)}</span></div>
        <div class="kmeta-row"><span class="kmeta-label">环比</span>${momArrow(lossA,mom_lossA)}</div>
      </div>
    </div>
  </div>

  <!-- ⑤ 收入目标执行率 -->
  <div class="sec">收入目标执行率</div>
  <div class="cc" style="margin-bottom:24px">
    <div class="ct">收入目标执行率</div>
    <div class="cs">实际收入 vs 月度目标</div>
    <div class="prog-list">
      ${[
        ['充值收入',incC,BUDGET.inc_charge,'bar-green'],
        ['广告收入',incA,BUDGET.inc_ad,'bar-blue'],
        ['其他收入',incO,BUDGET.inc_other,'bar-teal'],
      ].map(([name,val,target,barCls])=>{
        const pct=Math.min(pctOf(val,target),150);
        const pctDisplay=target>0?fmtPct(pctOf(val,target)):'—';
        const over=target>0&&val>target;
        return`<div class="prog-item">
          <div class="prog-header">
            <span class="prog-name">${name}</span>
            <div class="prog-vals">
              <span class="prog-pct ${over?'pos':''}">${pctDisplay}</span>
              <span class="prog-num">${fmt(val)} / ${fmt(target)}</span>
            </div>
          </div>
          <div class="prog-bg"><div class="prog-bar ${barCls}" style="width:${Math.min(pct,100)}%"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- ⑥ 支出消耗使用率 -->
  <div class="sec">支出消耗使用率</div>
  <div class="cc" style="margin-bottom:24px">
    <div class="ct">支出消耗使用率</div>
    <div class="cs">实际支出 vs 月度预算</div>
    <div class="prog-list">
      ${[
        ['技术开支',expT,BUDGET.exp_tech,'bar-blue'],
        ['运营开支',expO,BUDGET.exp_ops,'bar-green'],
        ['商务开支',expB,BUDGET.exp_biz,'bar-purple'],
        ['渠道开支',expCh,BUDGET.exp_channel,'bar-amber'],
        ['其他开支',expOt,BUDGET.exp_other,'bar-teal'],
      ].map(([name,val,budget,barCls])=>{
        const pct=budget>0?Math.min(pctOf(val,budget),150):0;
        const pctDisplay=budget>0?fmtPct(pctOf(val,budget)):'—';
        const over=budget>0&&val>budget;
        return`<div class="prog-item">
          <div class="prog-header">
            <span class="prog-name">${name}</span>
            <div class="prog-vals">
              <span class="prog-pct ${over?'neg':''}">${pctDisplay}</span>
              <span class="prog-num">${fmt(val)} / ${fmt(budget)}</span>
            </div>
          </div>
          <div class="prog-bg"><div class="prog-bar ${over?'bar-red':barCls}" style="width:${Math.min(pct,100)}%"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- ⑦ 收入结构 -->
  <div class="sec">收入结构</div>
  <div class="chart-row-2" style="margin-bottom:14px">
    <div class="cc">
      <div class="ct">充值 vs 广告收入占比</div>
      <div class="cs">本期收入结构</div>
      <div style="height:220px;display:flex;justify-content:center"><canvas id="chartIncPie"></canvas></div>
    </div>
    <div class="cc">
      <div class="ct">广告收入类型占比</div>
      <div class="cs">棋牌 · 约炮 · 播放器 · 直播 · 春药 · 成人游戏</div>
      <div style="height:220px;display:flex;justify-content:center"><canvas id="chartAdTypePie"></canvas></div>
    </div>
  </div>
  <div class="cc" style="margin-bottom:14px">
    <div class="ct">广告收入类型明细</div>
    <div class="cs">各类型收入金额</div>
    <div style="height:200px"><canvas id="chartAdTypeBar"></canvas></div>
  </div>
  <div class="cc" style="margin-bottom:24px">
    <div class="ct">广告收入本月 vs 上月对比</div>
    <div class="cs">按广告类型环比</div>
    <div style="height:200px"><canvas id="chartAdTypeMom"></canvas></div>
  </div>

  <!-- ⑧ 成本结构 -->
  <div class="sec">成本结构</div>
  <div class="chart-row-2" style="margin-bottom:14px">
    <div class="cc">
      <div class="ct">成本结构占比</div>
      <div class="cs">各项支出 + 损耗</div>
      <div style="height:220px;display:flex;justify-content:center"><canvas id="chartCostPie"></canvas></div>
    </div>
    <div class="cc">
      <div class="ct">成本明细横向对比</div>
      <div class="cs">各项实际支出金额</div>
      <div style="height:220px"><canvas id="chartCostBar"></canvas></div>
    </div>
  </div>
  <div class="cc" style="margin-bottom:24px">
    <div class="ct">成本本月 vs 上月对比</div>
    <div class="cs">各项支出环比变化</div>
    <div style="height:200px"><canvas id="chartCostMom"></canvas></div>
  </div>
  `;

  // ── 图表渲染 ──
  setTimeout(()=>{
    const pieOpts=(labels,data,colors)=>({
      type:'doughnut',
      data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'rgba(255,255,255,0.05)',borderWidth:1,hoverOffset:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#9099b0',font:{size:11},boxWidth:12}},tooltip:{...tooltipDefaults,callbacks:{label:c=>`${c.label}: ${fmt(c.raw)} (${fmtPct(c.parsed/c.dataset.data.reduce((a,b)=>a+b,0)*100)})`}}}}
    });

    const hbarOpts=(labels,datasets)=>({
      type:'bar',
      data:{labels,datasets},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,labels:{color:'#9099b0',font:{size:11}}},tooltip:{...tooltipDefaults,callbacks:{label:c=>`${c.dataset.label||''}: ${fmt(c.raw)}`}}},
        scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555e7a',font:{size:10},callback:v=>fmt(v)}},y:{grid:{display:false},ticks:{color:'#9099b0',font:{size:11}}}}}
    });

    // ① 收入饼图
    makeChart('chartIncPie', pieOpts(
      ['充值收入','广告收入','其他收入'],
      [incC,incA,incO],
      ['#60a5fa','#4ade80','#2dd4bf']
    ));

    // ② 广告类型饼图
    makeChart('chartAdTypePie', pieOpts(AD_TYPES, adTypeVals, AD_COLORS));

    // ③ 广告类型横向柱状图
    makeChart('chartAdTypeBar', hbarOpts(AD_TYPES,[{
      label:'广告收入',
      data:adTypeVals,
      backgroundColor:AD_COLORS.map(c=>c+'bb'),
      borderColor:AD_COLORS,
      borderWidth:1,
      borderRadius:4,
    }]));

    // ④ 广告类型环比（上月暂时为0）
    makeChart('chartAdTypeMom', hbarOpts(AD_TYPES,[
      {label:'本月',data:adTypeVals,backgroundColor:'rgba(96,165,250,0.7)',borderRadius:4},
      {label:'上月',data:AD_TYPES.map(()=>0),backgroundColor:'rgba(96,165,250,0.2)',borderRadius:4},
    ]));

    // ⑤ 成本饼图
    const costLabels=['技术开支','运营开支','商务开支','渠道开支','其他开支','充值损耗','广告损耗'];
    const costVals=[expT,expO,expB,expCh,expOt,lossC,lossA];
    const costColors=['#60a5fa','#4ade80','#a78bfa','#fbbf24','#2dd4bf','#f87171','#fb923c'];
    makeChart('chartCostPie', pieOpts(costLabels,costVals,costColors));

    // ⑥ 成本横向柱状图
    makeChart('chartCostBar', hbarOpts(costLabels,[{
      label:'实际金额',
      data:costVals,
      backgroundColor:costColors.map(c=>c+'bb'),
      borderColor:costColors,
      borderWidth:1,
      borderRadius:4,
    }]));

    // ⑦ 成本环比
    makeChart('chartCostMom', hbarOpts(costLabels,[
      {label:'本月',data:costVals,backgroundColor:'rgba(248,113,113,0.7)',borderRadius:4},
      {label:'上月',data:costLabels.map(()=>0),backgroundColor:'rgba(248,113,113,0.2)',borderRadius:4},
    ]));
  },100);
}

// ═══════════════════════════════════════════
// 数据刷新
// ═══════════════════════════════════════════
async function refresh(){
  try{
    const [dailyJson, adJson] = await Promise.all([
      fetchGID(GID_DAILY),
      fetchGID(GID_ADTYPE).catch(()=>({table:{rows:[]}}))
    ]);
    allRows = parseDailyRows(dailyJson);
    adTypeRows = parseAdTypeRows(adJson);
    render();
    document.getElementById('upd').textContent='最后更新 '+new Date().toLocaleTimeString('zh-CN');
  } catch(e){
    document.getElementById('main-content').innerHTML=
      `<div style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);border-radius:10px;padding:20px;color:#f87171;margin:20px 0;">
        ❌ 数据加载失败：${e.message}<br><br>请确认 Google Sheets 已设为公开可查看
      </div>`;
    // 即使数据加载失败，也用空数据渲染骨架
    allRows=[]; adTypeRows=[];
    render();
  }
}

// ═══════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════
(function init(){
  const t=new Date();
  filterFrom=toYMD(startOfMonth());
  filterTo=toYMD(t);
  document.getElementById('date-from').value=filterFrom;
  document.getElementById('date-to').value=filterTo;
  updateLabel();
})();

refresh();
setInterval(refresh,REFRESH_MS);
</script>
</body>
